<!DOCTYPE html>
<html>
<head>
    <title>Booking Partner Portal (Demo Only)</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; }
        .logo { height: 40px; margin-bottom: 20px; }
        .warning { background: #fff3cd; padding: 10px; border-left: 3px solid #ffc107; margin: 20px 0; font-size: 14px; }
        .demo-watermark { position: fixed; bottom: 10px; right: 10px; background: red; color: white; padding: 5px; }
    </style>
</head>
<body>
    <!-- Fake Booking.com-style logo -->
    <img src="https://via.placeholder.com/200x50?text=Fake+Booking+Portal" class="logo" alt="Fake Booking Portal">
    
    <!-- Demo warning banner -->
    <div class="warning">
        ⚠️ <strong>DEMONSTRATION ONLY</strong> - This is a simulated phishing page for educational purposes.
    </div>

    <!-- Fake login form -->
    <h2>Partner Sign In</h2>
    <form onsubmit="alert('This is a demo - no data is collected'); return false;">
        <div style="margin-bottom: 15px;">
            <label>Email:</label><br>
            <input type="email" style="width: 100%; padding: 8px;" placeholder="your@email.com">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label>Password:</label><br>
            <input type="password" style="width: 100%; padding: 8px;" placeholder="••••••••">
        </div>
        
        <button type="submit" style="background: #003580; color: white; padding: 10px 15px; border: none; cursor: pointer;">
            Sign In
        </button>
    </form>

    <!-- Visible watermark -->
    <div class="demo-watermark">SECURITY DEMO</div>
</body>
</html>
